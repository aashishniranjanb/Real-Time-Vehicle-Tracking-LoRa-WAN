; =========================================================
; LORAWAN VEHICLE TRACKING - PLATFORMIO CONFIGURATION
; =========================================================
; 
; Board: ESP32 DevKit V1 (or compatible)
; Framework: Arduino
; Libraries: LMIC (LoRaWAN), TinyGPS++ (GPS parsing)
;
; Build: pio run
; Upload: pio run -t upload
; Monitor: pio device monitor
;
; =========================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor settings
monitor_speed = 115200

; Library dependencies
lib_deps = 
    mcci-catena/MCCI LoRaWAN LMIC library @ ^4.1.1
    mikalhart/TinyGPSPlus @ ^1.0.3

; Build flags
build_flags = 
    ; LMIC configuration for India (IN865) region
    ; Change to your region: CFG_eu868, CFG_us915, CFG_au915, etc.
    -D CFG_in865=1
    -D CFG_sx1276_radio=1
    
    ; Disable LMIC features we don't need (saves memory)
    -D DISABLE_PING=1
    -D DISABLE_BEACONS=1
    
    ; Debug output
    -D CORE_DEBUG_LEVEL=3

; Upload settings
upload_speed = 921600

; Partition scheme (default is fine for this project)
board_build.partitions = default.csv
